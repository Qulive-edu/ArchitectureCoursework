# .github/workflows/rollback.yml
name: Rollback Deployment (Docker Compose)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options: [staging, production]
      service:
        description: 'Service to rollback'
        required: true
        type: choice
        options: [backend, frontend, all]
      target_sha:
        description: 'Git SHA of the stable version to rollback to'
        required: true
        type: string
      reason:
        description: 'Reason for rollback (optional)'
        required: false
        type: string

jobs:
  rollback:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase image name
        run: echo "IMAGE_NAME_LOWER=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Prepare environment variables
        run: |
          # Определяем, какие сервисы перезапускать
          if [[ "${{ github.event.inputs.service }}" == "backend" ]]; then
            echo "SERVICES=back" >> $GITHUB_ENV
            echo "IMAGE_SUFFIX=backend" >> $GITHUB_ENV
          elif [[ "${{ github.event.inputs.service }}" == "frontend" ]]; then
            echo "SERVICES=front" >> $GITHUB_ENV
            echo "IMAGE_SUFFIX=frontend" >> $GITHUB_ENV
          else
            echo "SERVICES=back front" >> $GITHUB_ENV
            echo "IMAGE_SUFFIX=all" >> $GITHUB_ENV
          fi

      - name: Pull previous image version
        run: |
          TARGET_SHA="${{ github.event.inputs.target_sha }}"
          
          if [[ "${{ github.event.inputs.service }}" == "backend" || "${{ github.event.inputs.service }}" == "all" ]]; then
            echo "Pulling backend:$TARGET_SHA"
            docker pull ghcr.io/${{ env.IMAGE_NAME_LOWER }}/backend:$TARGET_SHA
          fi
          
          if [[ "${{ github.event.inputs.service }}" == "frontend" || "${{ github.event.inputs.service }}" == "all" ]]; then
            echo "Pulling frontend:$TARGET_SHA"
            docker pull ghcr.io/${{ env.IMAGE_NAME_LOWER }}/frontend:$TARGET_SHA
          fi

      - name: Redeploy with previous version
        run: |
          # Перезапускаем сервисы с указанным образом
          # Используем переменную окружения для переопределения тега
          docker compose \
            -f docker-compose.yml \
            up -d \
            --no-deps \
            ${{ env.SERVICES }}
          
          echo " Services redeployed with SHA: ${{ github.event.inputs.target_sha }}"

      - name: Wait for health checks
        run: |
          echo "Waiting for services to be healthy..."
          
          # Ждём, пока backend начнёт отвечать
          for i in {1..30}; do
            if curl -sf http://localhost:8090/places > /dev/null 2>&1; then
              echo "Backend is responding"
              break
            fi
            echo "  Waiting... ($i/30)"
            sleep 2
          done
          
          # Ждём, пока frontend начнёт отвечать
          for i in {1..30}; do
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "Frontend is responding"
              break
            fi
            echo "  Waiting... ($i/30)"
            sleep 2
          done

      - name: Run smoke tests
        run: |
            echo "🔍 Running smoke tests..."
            
            # 1. Ждём, пока бэкенд станет доступен (до 60 секунд)
            echo "Waiting for backend to be ready..."
            for i in {1..30}; do
            if curl -sf --max-time 2 http://localhost:8090/places > /dev/null 2>&1; then
                echo "Backend is ready after $((i*2))s"
                break
            fi
            echo "  Waiting... ($i/30)"
            sleep 2
            done
            
            # 2. Проверяем, что фронтенд тоже отвечает (если деплоили его)
            if [[ "${{ github.event.inputs.service }}" == "frontend" || "${{ github.event.inputs.service }}" == "all" ]]; then
            echo "Waiting for frontend to be ready..."
            for i in {1..30}; do
                if curl -sf --max-time 2 http://localhost:3000 > /dev/null 2>&1; then
                echo "Frontend is ready after $((i*2))s"
                break
                fi
                echo "  Waiting... ($i/30)"
                sleep 2
            done
            fi
            
            # 3. Запускаем упрощённые тесты (без jq, без сложных проверок)
            echo "🧪 Running basic health checks..."
            
            # Проверка бэкенда
            if ! curl -sf http://localhost:8090/places > /tmp/places.json; then
            echo "Backend health check failed"
            echo "Backend logs:"
            docker compose logs --tail=20 back
            exit 1
            fi
            echo "Backend: /places OK"
            
            # Проверка, что ответ — валидный JSON с данными
            if ! grep -q '"id"' /tmp/places.json || ! grep -q '"title"' /tmp/places.json; then
            echo "Backend response format invalid"
            cat /tmp/places.json
            exit 1
            fi
            echo "Backend: response format OK"
            
            # Проверка фронтенда (если деплоили)
            if [[ "${{ github.event.inputs.service }}" == "frontend" || "${{ github.event.inputs.service }}" == "all" ]]; then
            if ! curl -sf http://localhost:3000 > /dev/null; then
                echo "Frontend health check failed"
                echo "📋 Frontend logs:"
                docker compose logs --tail=20 front
                exit 1
            fi
            echo "Frontend: root page OK"
            fi
            
            echo "All smoke tests passed"

      - name: Notify rollback complete
        run: |
          echo "Rollback completed successfully:"
          echo "   • Environment: ${{ github.event.inputs.environment }}"
          echo "   • Service: ${{ github.event.inputs.service }}"
          echo "   • Target SHA: ${{ github.event.inputs.target_sha }}"
          echo "   • Reason: ${{ github.event.inputs.reason || 'No reason provided' }}"
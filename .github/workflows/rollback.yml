# .github/workflows/rollback.yml
name: Rollback Deployment

on:
  workflow_dispatch:
    inputs:
      environment:
        required: true
        type: choice
        options: [staging, production]
      target_sha:
        description: 'SHA предыдущей стабильной версии'
        required: true
        type: string

jobs:
  rollback:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    steps:
      - name: Deploy previous version
        run: |
          echo "🔄 Rolling back to ${{ github.event.inputs.target_sha }}"
          
          # Обновляем deployment в Kubernetes/Swarm
          kubectl set image deployment/backend \
            backend=ghcr.io/${{ github.repository }}/backend:${{ github.event.inputs.target_sha }} \
            -n ${{ github.event.inputs.environment }}
          
          # Ждём готовности
          kubectl rollout status deployment/backend -n ${{ github.event.inputs.environment }} --timeout=300s
          
          # Запускаем smoke tests
          ./scripts/smoke-test.sh ${{ vars.API_URL }} ${{ secrets.TEST_TOKEN }}
name: ParkingRent CI/CD (Practice)

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=,format=long
            type=ref,event=branch
            latest

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            COMMIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}

  build-migration:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push migration image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.migrate
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/migrations:${{ github.sha }}
            ghcr.io/${{ github.repository }}/migrations:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    needs: [build, build-migration]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment: ${{ github.event.inputs.environment }}
    outputs:
      release_id: ${{ steps.create-release.outputs.id }}
      migration_version: ${{ steps.migrate.outputs.version }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run migrations (release stage)
        id: migrate
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
        run: |
          # Запускаем миграции в изолированном контейнере
          MIGRATION_VERSION=$(docker run --rm \
            -e DB_HOST=$DB_HOST \
            -e DB_PORT=$DB_PORT \
            -e DB_USER=$DB_USER \
            -e DB_PASSWORD=$DB_PASSWORD \
            -e DB_NAME=$DB_NAME \
            ghcr.io/${{ github.repository }}/migrations:${{ github.sha }} \
            /migrate -mode=migrate 2>&1 | grep "current version" | awk '{print $NF}')
          
          echo "version=$MIGRATION_VERSION" >> $GITHUB_OUTPUT
          echo "✅ Migrations applied, version: $MIGRATION_VERSION"

      - name: Generate release manifest
        id: create-release
        run: |
          cat > release-manifest.json << EOF
          {
            "release_id": "${{ github.sha }}-$(date +%s)",
            "git_sha": "${{ github.sha }}",
            "environment": "${{ github.event.inputs.environment }}",
            "migration_version": "${{ steps.migrate.outputs.version }}",
            "images": {
              "backend": "ghcr.io/${{ github.repository }}/backend:${{ github.sha }}",
              "frontend": "ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}",
              "migrations": "ghcr.io/${{ github.repository }}/migrations:${{ github.sha }}"
            },
            "created_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
          echo "manifest=release-manifest.json" >> $GITHUB_OUTPUT

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ github.sha }}
          path: release-manifest.json
          retention-days: 30

  deploy:
      needs: [build, build-migration]
      runs-on: ubuntu-latest
      if: github.event_name == 'workflow_dispatch'
      environment: ${{ github.event.inputs.environment }}
      permissions:
        contents: read
        deployments: write
      outputs:
        backend_image: ${{ steps.info.outputs.backend }}
        frontend_image: ${{ steps.info.outputs.frontend }}
      steps:
        - name: Extract image info
          id: info
          run: |
            echo "backend=ghcr.io/${{ env.IMAGE_NAME }}/backend:${{ github.sha }}" >> $GITHUB_OUTPUT
            echo "frontend=ghcr.io/${{ env.IMAGE_NAME }}/frontend:${{ github.sha }}" >> $GITHUB_OUTPUT

        - name: Wait for propagation (simulated)
          run: |
            echo "Waiting for services to start..."
            sleep 3
            echo "All services healthy"

        - name: Create GitHub Deployment
          uses: bobheadxi/deployments@v1
          id: deployment
          with:
            step: start
            token: ${{ secrets.GITHUB_TOKEN }}
            env: ${{ github.event.inputs.environment }}
            ref: ${{ github.sha }}          # 👈 SHA вместо refs/heads/*
            desc: "Deploying ${{ github.sha }} to ${{ github.event.inputs.environment }}"

        - name: Report deployment status
          uses: bobheadxi/deployments@v1
          if: always()
          with:
            step: finish
            token: ${{ secrets.GITHUB_TOKEN }}
            env: ${{ github.event.inputs.environment }}
            status: ${{ job.status }}
            deployment_id: ${{ steps.deployment.outputs.deployment_id }}
            desc: "Deployment ${{ job.status }} for ${{ github.sha }}"
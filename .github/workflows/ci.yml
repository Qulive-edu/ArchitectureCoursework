name: ParkingRent CI/CD (Practice)

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=,format=long
            type=ref,event=branch
            latest

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            COMMIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}

  migrate:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment: ${{ github.event.inputs.environment }}
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run migrations
        run: |
          docker run --rm \
            --network ${{ github.event.inputs.environment == 'production' && 'prod-network' || 'staging-network' }} \
            -e DB_HOST=${{ vars.DB_HOST }} \
            -e DB_PORT=${{ vars.DB_PORT }} \
            -e DB_USER=${{ vars.DB_USER }} \
            -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
            -e DB_NAME=${{ vars.DB_NAME }} \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:${{ github.sha }} \
            ./main -mode=migrate -config=/app/config/config.yml
          
      - name: Verify migration success
        run: |
          echo "Migrations completed for ${{ github.event.inputs.environment }}"

  deploy:
      needs: [build, migrate]
      runs-on: ubuntu-latest
      if: github.event_name == 'workflow_dispatch'
      environment: ${{ github.event.inputs.environment }}
      permissions:
        contents: read
        deployments: write
      outputs:
        backend_image: ${{ steps.info.outputs.backend }}
        frontend_image: ${{ steps.info.outputs.frontend }}
      steps:
        - name: Extract image info
          id: info
          run: |
            echo "backend=ghcr.io/${{ env.IMAGE_NAME }}/backend:${{ github.sha }}" >> $GITHUB_OUTPUT
            echo "frontend=ghcr.io/${{ env.IMAGE_NAME }}/frontend:${{ github.sha }}" >> $GITHUB_OUTPUT

        - name: Wait for propagation (simulated)
          run: |
            echo "Waiting for services to start..."
            sleep 3
            echo "All services healthy"

        - name: Create GitHub Deployment
          uses: bobheadxi/deployments@v1
          id: deployment
          with:
            step: start
            token: ${{ secrets.GITHUB_TOKEN }}
            env: ${{ github.event.inputs.environment }}
            ref: ${{ github.sha }}          # 👈 SHA вместо refs/heads/*
            desc: "Deploying ${{ github.sha }} to ${{ github.event.inputs.environment }}"
            no_override: false
            transient: false

        - name: Report deployment status
          uses: bobheadxi/deployments@v1
          if: always()
          with:
            step: finish
            token: ${{ secrets.GITHUB_TOKEN }}
            env: ${{ github.event.inputs.environment }}
            status: ${{ job.status }}
            deployment_id: ${{ steps.deployment.outputs.deployment_id }}
            desc: "Deployment ${{ job.status }} for ${{ github.sha }}"